  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

argin: 0 0 10px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent, #1D4ED8)\">Brooklyn, NY<\u002Fp>\n          <h1 style=\"margin: 0; font-size: clamp(40px, 7vw, 62px); line-height: 1.02; letter-spacing: -0.025em; font-weight: 700\">Khazratjon Amonov<\u002Fh1>\n          <p style=\"margin: 18px 0 0; font-size: 19px; line-height: 1.45; color: #4b5158\">Data Analytics Student <span style=\"color: #b0b6bd\">·<\u002Fspan> <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 16px\">Python · SQL · Tableau · R<\u002Fspan><\u002Fp>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px\">\n            <a href=\"mailto:khazratjona3@gmail.com\" style=\"display: inline-flex; align-items: center; gap: 8px; background: var(--accent, #1D4ED8); color: #ffffff; padding: 12px 22px; border-radius: 6px; font-weight: 600; font-size: 15px; text-decoration: none\" style-hover=\"background: #12318f; color: #ffffff; text-decoration: none\">Email me<\u002Fa>\n            <a href=\"tel:+13478330788\" style=\"display: inline-flex; align-items: center; gap: 8px; border: 1.5px solid #d4d8de; color: #1a1d21; padding: 12px 22px; border-radius: 6px; font-weight: 500; font-size: 15px; font-family: 'IBM Plex Mono', monospace; text-decoration: none\" style-hover=\"border-color: var(--accent, #1D4ED8); color: var(--accent, #1D4ED8); text-decoration: none\">(347) 833-0788<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- sparkline signature -->\n      <svg id=\"hero-spark\" viewBox=\"0 0 880 60\" preserveAspectRatio=\"none\" aria-hidden=\"true\" style=\"display: block; width: 100%; height: 60px; margin-top: 56px\">\n        <polyline id=\"spark-path\" points=\"0,48 70,44 140,50 210,36 280,40 350,28 420,34 490,22 560,27 630,16 700,21 770,10 840,14 880,6\" fill=\"none\" stroke=\"var(--accent, #1D4ED8)\" stroke-width=\"2\" stroke-linejoin=\"round\" str ont-size: clamp(28px, 4.5vw, 40px); font-weight: 700; letter-spacing: -0.02em\">Let's talk data.<\u002Fh2>\n      <div style=\"display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 28px; margin-top: 24px; font-size: 16px\">\n        <a href=\"mailto:khazratjona3@gmail.com\">khazratjona3@gmail.com<\u002Fa>\n        <span style=\"color: #c6cbd1\">·<\u002Fspan>\n        <a href=\"tel:+13478330788\">(347) 833-0788<\u002Fa>\n        <span style=\"color: #c6cbd1\">·<\u002Fspan>\n        <span style=\"color: #6b7178\">Brooklyn, NY<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin: 36px 0 0; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #9aa1a9\">English · Tajik · Russian · Uzbek<\u002Fp>\n    <\u002Ffooter>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#1D4ED8&quot;, &quot;options&quot;: [&quot;#1D4ED8&quot;, &quot;#0E7490&quot;, &quot;#047857&quot;, &quot;#B45309&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot; },\n  &quot;photoShape&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;circle&quot;, &quot;options&quot;: [&quot;circle&quot;, &quot;rounded&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot; },\n  &quot;motion&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;subtle&quot;, &quot;options&quot;: [&quot;subtle&quot;, &quot;minimal&quot;, &quot;none&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot; }\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const accent = this.props.accent ?? '#1D4ED8';\n    const photoRadius = (this.props.photoShape ?? 'circle') === 'circle' ? '50%' : '18px';\n    return {\n      accent,\n      photoRadius,\n      skillGroups: [\n        { label: 'Languages', opacity: 1, items: ['Python', 'R', 'JavaScript', 'HTML', 'CSS'] },\n        { label: 'Data & Analytics Tools', opacity: 0.85, items: ['Tableau', 'SQL', 'RStudio', 'Excel (PivotTables, Power Query)', 'pandas / Jupyter'] },\n        { label: 'Office & Productivity', opacity: 0.7, items: ['Microsoft Office Suite', 'Notion', 'Canva'] },\n        { label: 'AI Tools', opacity: 0.55, items: ['ChatGPT', 'Claude', 'Microsoft Copilot', 'Perplexity AI / Comet'] },\n        { label: 'Business & Research', opacity: 0.4, items: ['Cold outreach', 'Client scheduling & follow-up', 'Archival organization', 'Grant research & tracking'] },\n        { label: 'Spoken Languages', opacity: 0.25, items: ['English', 'Tajik', 'Russian', 'Uzbek'] }\n      ],\n      jobs: [\n        {\n          dates: 'Jun 2026 – Present', tag: 'Analytics',\n          role: 'Data Analytics Resident',\n          org: 'Tech Talent Pipeline Residency (TTPR), NYC Dept. of Small Business Services — New York, NY',\n          bullets: [\n            'Build predictive models on banking datasets in Python, including loan-approval and credit card churn analysis',\n            'Design executive Tableau dashboards translating retail and SaaS revenue data into decision-ready insights',\n            'Clean and analyze large datasets with pandas, SQL, and Excel to support forecasting and business decisions'\n          ]\n        },\n        {\n          dates: 'Jan 2026 – Present', tag: 'Operations',\n          role: 'Assistant Manager (promoted from Barista)',\n          org: 'Qamaria Yemeni Coffee Co. — New York, NY',\n          bullets: [\n            'Promoted to Assistant Manager within six weeks based on operational input and performance',\n            'Direct daily operations including cash handling, register reconciliation, and inventory oversight',\n            'Train and onboard new team members and coordinate shift scheduling during peak service periods'\n          ]\n        },\n        {\n          dates: 'Feb 2025 – May 2025', tag: ' \n    const motion = this.props.motion ?? 'subtle';\n    if (motion === 'none') return;\n\n    // Sparkline draw-on-view (subtle data motion only)\n    const path = document.getElementById('spark-path');\n    if (path && motion === 'subtle') {\n      const len = path.getTotalLength ? path.getTotalLength() : 1000;\n      path.style.strokeDasharray = len;\n      path.style.strokeDashoffset = len;\n      const sparkObs = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            path.style.animation = 'spark-draw 1.6s ease-out forwards';\n            sparkObs.disconnect();\n          }\n        });\n      }, { threshold: 0.3 });\n      sparkObs.observe(path);\n    }\n\n    // Gentle fade-in on scroll for sections below the fold\n    const els = document.querySelectorAll('[data-reveal]');\n    const obs = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          obs.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.12 });\n    els.forEach((el) => {\n      const r = el.getBoundingClientRect();\n      if (r.top > window.innerHeight * 0.9) {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(18px)';\n        el.style.transition = 'opacity 0.7s ease, transform 0.7s ease';\n        obs.observe(el);\n      }\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
